<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Spotless">
<meta name="theme-color" content="#ffffff">
<title>Spotless — Cleaning Schedule</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#f5f5f3;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px;color:#111}
.app{max-width:430px;margin:0 auto;min-height:100vh;background:#f5f5f3;display:flex;flex-direction:column}
.header{padding:env(safe-area-inset-top,16px) 16px 10px;background:#fff;border-bottom:.5px solid #e5e5e5;display:flex;align-items:center;justify-content:space-between}
.header-left{}
.header-title{font-size:22px;font-weight:600;color:#111;letter-spacing:-.3px}
.header-date{font-size:12px;color:#888;margin-top:1px}
.streak-pill{background:#EAF3DE;color:#27500A;font-size:12px;font-weight:600;padding:5px 11px;border-radius:20px;white-space:nowrap}

.nav{display:flex;background:#fff;border-bottom:.5px solid #e5e5e5}
.nav-btn{flex:1;padding:10px 0 8px;font-size:11px;color:#888;background:none;border:none;border-bottom:2.5px solid transparent;cursor:pointer;font-family:inherit;transition:color .15s;display:flex;flex-direction:column;align-items:center;gap:2px}
.nav-btn.active{color:#1D9E75;border-bottom-color:#1D9E75;font-weight:600}
.nav-icon{font-size:18px}

.scroll-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:env(safe-area-inset-bottom,20px)}

.page{display:none;padding:14px 14px 30px}
.page.active{display:block}

.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px}
.stat{background:#fff;border-radius:14px;padding:13px 14px;border:.5px solid #e5e5e5}
.stat-label{font-size:11px;color:#888;margin-bottom:3px;font-weight:500}
.stat-val{font-size:26px;font-weight:600;color:#111;letter-spacing:-.5px}
.stat-sub{font-size:11px;color:#888;margin-top:2px}
.stat.shame{background:#FFF5F5;border-color:#F09595}
.stat.shame .stat-val{color:#A32D2D}
.stat.shame .stat-sub{color:#791F1F}
.stat.good{background:#EAF3DE;border-color:#97C459}
.stat.good .stat-val{color:#27500A}

.prog-wrap{background:#e5e5e5;border-radius:4px;height:7px;overflow:hidden;margin:6px 0 3px}
.prog-bar{height:100%;background:#1D9E75;border-radius:4px;transition:width .4s cubic-bezier(.4,0,.2,1)}
.prog-labels{display:flex;justify-content:space-between;font-size:11px;color:#888}

.sec{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:#888;margin:14px 0 6px}

.task-card{background:#fff;border:.5px solid #e5e5e5;border-radius:14px;margin-bottom:8px;overflow:hidden}
.task-row{display:flex;align-items:center;gap:11px;padding:12px 14px;cursor:pointer;transition:background .1s;min-height:50px}
.task-row+.task-row{border-top:.5px solid #f0f0f0}
.task-row:active{background:#f9f9f9}
.check{width:22px;height:22px;border-radius:50%;border:1.5px solid #ccc;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s}
.check.done{background:#1D9E75;border-color:#1D9E75}
.check svg{opacity:0;transition:opacity .15s}
.check.done svg{opacity:1}
.task-name{font-size:13px;color:#111;flex:1;line-height:1.35}
.task-name.done{color:#bbb;text-decoration:line-through}
.task-actions{display:flex;gap:4px;flex-shrink:0}
.act-btn{font-size:11px;padding:4px 8px;border-radius:10px;border:.5px solid #e5e5e5;background:#f5f5f3;color:#888;cursor:pointer;font-family:inherit}
.act-btn:active{background:#e5e5e5}
.badge-m{font-size:10px;padding:2px 7px;border-radius:10px;background:#FAEEDA;color:#633806;white-space:nowrap;font-weight:500}
.badge-a{font-size:10px;padding:2px 7px;border-radius:10px;background:#E6F1FB;color:#0C447C;white-space:nowrap;font-weight:500}
.badge-snz{font-size:10px;padding:2px 6px;border-radius:10px;background:#FAEEDA;color:#854F0B;font-weight:500}

.overdue-banner{background:#FAEEDA;border:.5px solid #EF9F27;border-radius:14px;padding:12px 14px;margin-bottom:10px;font-size:13px;color:#633806;line-height:1.4}
.overdue-banner strong{font-weight:600}

.btn-primary{width:100%;padding:14px;background:#1D9E75;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:8px;transition:opacity .15s}
.btn-primary:active{opacity:.85}
.btn-ghost{width:100%;padding:12px;background:#fff;color:#888;border:.5px solid #e5e5e5;border-radius:12px;font-size:14px;cursor:pointer;font-family:inherit;margin-top:6px}
.btn-ghost:active{background:#f5f5f3}
.btn-danger{width:100%;padding:12px;background:#fff;color:#A32D2D;border:.5px solid #F09595;border-radius:12px;font-size:14px;cursor:pointer;font-family:inherit;margin-top:6px}

.day-pills{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:10px;scrollbar-width:none}
.day-pills::-webkit-scrollbar{display:none}
.day-pill{flex-shrink:0;padding:7px 13px;border-radius:20px;font-size:13px;font-weight:500;border:.5px solid #e5e5e5;background:#fff;color:#888;cursor:pointer}
.day-pill.sel{background:#1D9E75;color:#fff;border-color:#1D9E75}
.day-pill.done-pill{background:#EAF3DE;color:#27500A;border-color:#97C459}
.day-pill.part-pill{border-color:#1D9E75;color:#0F6E56}

.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:10px}
.wc{aspect-ratio:1;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:9px;gap:1px}
.wc-lbl{font-size:8px;color:#888}
.wc-full{background:#1D9E75;color:#fff}
.wc-part{background:#9FE1CB;color:#085041}
.wc-none{background:#f0f0f0;color:#bbb}
.wc-today{outline:2.5px solid #1D9E75;outline-offset:-2px}

.hm-grid{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px}
.hm{width:28px;height:28px;border-radius:5px}
.hm0{background:#f0f0f0}.hm1{background:#9FE1CB}.hm2{background:#5DCAA5}.hm3{background:#1D9E75}.hm4{background:#0F6E56}

.insight{background:#fff;border:.5px solid #e5e5e5;border-radius:14px;padding:14px;margin-bottom:8px}
.insight-title{font-size:14px;font-weight:600;color:#111;margin-bottom:3px}
.insight-val{font-size:26px;font-weight:600;color:#1D9E75;margin:4px 0;letter-spacing:-.5px}
.insight-body{font-size:13px;color:#888;line-height:1.5}

.badge-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:10px}
.badge-item{background:#fff;border:.5px solid #e5e5e5;border-radius:14px;padding:12px;display:flex;align-items:center;gap:10px}
.badge-icon{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.badge-name{font-size:12px;font-weight:600;color:#111}
.badge-desc{font-size:10px;color:#888;margin-top:1px}
.badge-locked{opacity:.35;filter:grayscale(1)}

.goal-card{background:#fff;border:.5px solid #e5e5e5;border-radius:14px;padding:13px;margin-bottom:8px}
.goal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.goal-title{font-size:13px;font-weight:600;color:#111}
.goal-pct{font-size:13px;color:#1D9E75;font-weight:600}

.room-card{background:#fff;border:.5px solid #e5e5e5;border-radius:14px;padding:13px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.room-icon{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.room-name{font-size:14px;font-weight:600;color:#111}
.room-last{font-size:12px;color:#888;margin-top:2px}
.room-status{font-size:11px;font-weight:600;padding:4px 9px;border-radius:10px;white-space:nowrap}
.rs-good{background:#EAF3DE;color:#27500A}
.rs-ok{background:#FAEEDA;color:#633806}
.rs-over{background:#FCEBEB;color:#A32D2D}

.season-card{background:#fff;border:.5px solid #e5e5e5;border-radius:14px;padding:13px 14px;margin-bottom:8px}
.season-head{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.season-icon{font-size:22px}
.season-title{font-size:15px;font-weight:600;color:#111}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-top:.5px solid #f0f0f0}
.toggle-label{font-size:13px;color:#111}
.tog{width:40px;height:24px;border-radius:12px;background:#ccc;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
.tog.on{background:#1D9E75}
.tog-knob{width:20px;height:20px;border-radius:50%;background:#fff;position:absolute;top:2px;left:2px;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.tog.on .tog-knob{left:18px}

.report-card{background:#fff;border:.5px solid #e5e5e5;border-radius:14px;padding:16px;margin-bottom:8px;text-align:center}
.report-grade{font-size:52px;font-weight:700;color:#1D9E75;letter-spacing:-2px;margin:8px 0 4px}
.report-grade.grade-f{color:#A32D2D}
.report-grade.grade-d{color:#D85A30}
.report-grade.grade-c{color:#BA7517}
.report-msg{font-size:13px;color:#888;line-height:1.5}

.notif-row{background:#fff;border:.5px solid #e5e5e5;border-radius:14px;padding:13px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.notif-info{flex:1}
.notif-title{font-size:14px;font-weight:600;color:#111}
.notif-sub{font-size:12px;color:#888;margin-top:2px}

input[type=time]{border:.5px solid #e5e5e5;border-radius:10px;padding:10px 12px;font-size:14px;color:#111;background:#fff;font-family:inherit;width:100%;margin-top:6px}

.empty{text-align:center;padding:2rem;color:#888;font-size:14px}

.toast{position:fixed;bottom:calc(env(safe-area-inset-bottom,0px) + 80px);left:50%;transform:translateX(-50%);background:#2C2C2A;color:#fff;font-size:13px;font-weight:500;padding:9px 18px;border-radius:22px;white-space:nowrap;opacity:0;transition:opacity .25s;pointer-events:none;z-index:1000}
.toast.show{opacity:1}

.conf-wrap{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999;overflow:hidden}
.conf{position:absolute;width:9px;height:9px;animation:cffall linear forwards}
@keyframes cffall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}

.install-hint{background:#EAF3DE;border:.5px solid #97C459;border-radius:14px;padding:13px 14px;margin-bottom:14px;font-size:13px;color:#27500A;line-height:1.5}
.install-hint strong{font-weight:600}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-left">
      <div class="header-title">Spotless</div>
      <div class="header-date" id="hdate"></div>
    </div>
    <div class="streak-pill" id="streak-pill">0 day streak</div>
  </div>

  <div class="nav">
    <button class="nav-btn active" onclick="nav('today',this)"><span class="nav-icon">✓</span>Today</button>
    <button class="nav-btn" onclick="nav('week',this)"><span class="nav-icon">📅</span>Week</button>
    <button class="nav-btn" onclick="nav('rooms',this)"><span class="nav-icon">🏠</span>Rooms</button>
    <button class="nav-btn" onclick="nav('stats',this)"><span class="nav-icon">📊</span>Stats</button>
    <button class="nav-btn" onclick="nav('more',this)"><span class="nav-icon">⚙️</span>More</button>
  </div>

  <div class="scroll-body">
    <div id="page-today" class="page active"></div>
    <div id="page-week" class="page"></div>
    <div id="page-rooms" class="page"></div>
    <div id="page-stats" class="page"></div>
    <div id="page-more" class="page"></div>
  </div>
</div>

<div class="conf-wrap" id="confetti"></div>
<div class="toast" id="toast"></div>

<script>
const DAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const DS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const now=new Date();
const todayIdx=now.getDay();
const todayName=DAYS[todayIdx];
const todayKey=now.toISOString().split('T')[0];

const SCHEDULE={
  Monday:[
    {id:'m1',t:'Put on clothes wash',f:'w'},
    {id:'m2',t:'Transfer clothes to dryer or hang to dry',f:'w'},
    {id:'m3',t:'Empty bathroom bin',f:'a'},
    {id:'m4',t:'Empty bedroom bin',f:'a'},
    {id:'m5',t:'General tidy — reset surfaces and shelves',f:'a'},
  ],
  Tuesday:[
    {id:'tu1',t:'Fold and put away clothes',f:'w'},
    {id:'tu2',t:'Dust decorative items and shelves',f:'w'},
    {id:'tu3',t:'Wipe hard surfaces and windowsills',f:'w'},
  ],
  Wednesday:[
    {id:'w1',t:'Put on towels wash',f:'w'},
    {id:'w2',t:'Transfer towels to dryer or hang to dry',f:'w'},
    {id:'w3',t:'Wipe laundry room surfaces',f:'w'},
    {id:'w4',t:'Wipe all mirrors and glass surfaces',f:'w'},
    {id:'w5',t:'Clean washing machine seal and drum',f:'m'},
    {id:'w6',t:'Clean dryer lint trap and drum',f:'m'},
  ],
  Thursday:[
    {id:'th1',t:'Fold and put away towels',f:'w'},
    {id:'th2',t:'Wipe bathroom vanity and sink',f:'w'},
    {id:'th3',t:'Wipe toilet seat and lid',f:'w'},
    {id:'th4',t:'Wipe desk surface and organise',f:'w'},
    {id:'th5',t:'Tidy clutter — quick reset',f:'a'},
  ],
  Friday:[
    {id:'f1',t:'Wipe kitchen bench and sink',f:'a'},
    {id:'f2',t:'Wipe stovetop',f:'a'},
    {id:'f3',t:'Tidy clutter — reset before weekend',f:'a'},
  ],
  Saturday:[
    {id:'sa1',t:'Vacuum carpet — all rooms',f:'w'},
    {id:'sa2',t:'Vacuum and mop bathroom floor tiles',f:'w'},
    {id:'sa3',t:'Scrub shower recess and screen',f:'w'},
    {id:'sa4',t:'Clean bath tub and taps',f:'w'},
    {id:'sa5',t:'Clean toilet — bowl, seat, lid, and base',f:'w'},
    {id:'sa6',t:'Wipe bathroom vanity and sink',f:'w'},
    {id:'sa7',t:'Change bed linen',f:'m'},
    {id:'sa8',t:'Clean air conditioning filters',f:'m'},
  ],
  Sunday:[
    {id:'su1',t:'Wash all dishes and pots from meal prep',f:'w'},
    {id:'su2',t:'Wipe ceramic stovetop thoroughly',f:'w'},
    {id:'su3',t:'Wipe all kitchen benches and surfaces',f:'w'},
    {id:'su4',t:'Wipe exterior of fridge, oven, microwave, air fryer and toaster',f:'w'},
    {id:'su5',t:'Wipe kitchen sink and tap',f:'w'},
    {id:'su6',t:'Rinse coffee machine',f:'w'},
    {id:'su7',t:'Clean inside microwave',f:'m'},
    {id:'su8',t:'Clean inside fridge',f:'m'},
    {id:'su9',t:'Deep clean oven interior',f:'m'},
    {id:'su10',t:'Clean air fryer basket and interior',f:'m'},
    {id:'su11',t:'Clean toaster — crumb tray and interior',f:'m'},
    {id:'su12',t:'Descale coffee machine',f:'m'},
    {id:'su13',t:'Replace kitchen sponge',f:'m'},
  ]
};

const MONTHLY_ROT=[
  'Descale kettle and clean taps',
  'Wipe cupboard and drawer fronts',
  'Wipe pantry shelves and reorganise',
  'Clean shower tracks and drain',
  'Dust and deep wipe all decorative items',
  'Wipe light switches and door handles',
];

const SEASONAL={
  summer:{icon:'☀️',tasks:['Deep clean fan blades','Wipe air con vents thoroughly','Wash outdoor furniture']},
  autumn:{icon:'🍂',tasks:['Wash heavy blankets before storage','Deep clean oven before winter','Sort and store warm-weather items']},
  winter:{icon:'❄️',tasks:['Check and clean heater filters','Deep clean oven before holiday cooking','Wash all throw blankets']},
  spring:{icon:'🌱',tasks:['Steam clean carpet','Wash all curtains and blinds','Full wardrobe reorganise']},
};

const ROOMS=[
  {id:'kitchen',name:'Kitchen',icon:'🍳'},
  {id:'bathroom',name:'Bathroom',icon:'🚿'},
  {id:'bedroom',name:'Bedroom',icon:'🛏'},
  {id:'living',name:'Living room',icon:'🛋'},
  {id:'laundry',name:'Laundry',icon:'🫧'},
];

const BADGES=[
  {id:'first',icon:'⭐',name:'First clean',desc:'Complete your first task',cond:s=>s.total>=1},
  {id:'s3',icon:'🔥',name:'3-day streak',desc:'3 days in a row',cond:s=>s.streak>=3},
  {id:'s7',icon:'💪',name:'Week warrior',desc:'7 days in a row',cond:s=>s.streak>=7},
  {id:'perf',icon:'✨',name:'Perfect day',desc:'100% on any day',cond:s=>s.perfect},
  {id:'s30',icon:'🏆',name:'Monthly master',desc:'30-day streak',cond:s=>s.streak>=30},
  {id:'shame',icon:'😇',name:'Zero shame',desc:'No overdue tasks for 3 days',cond:s=>s.shame===0&&s.total>5},
];

let S={};
try{S=JSON.parse(localStorage.getItem('spotless_v3')||'{}')}catch(e){}
if(!S.snoozed)S.snoozed={};
if(!S.skipped)S.skipped={};
if(!S.rooms)S.rooms={};
if(!S.season)S.season={};
if(!S.badges)S.badges={};
if(!S.notifTime)S.notifTime='19:00';
if(!S.perfect)S.perfect=false;
function sv(){try{localStorage.setItem('spotless_v3',JSON.stringify(S))}catch(e){}}

let selDay=todayName;
let curPage='today';

function getSeason(){
  const m=now.getMonth();
  if(m>=11||m<=1)return'summer';
  if(m>=2&&m<=4)return'autumn';
  if(m>=5&&m<=7)return'winter';
  return'spring';
}

function dk(day,id,dateKey){return(dateKey||todayKey)+'|'+day+'|'+id;}
function done(day,id,dtk){return!!S[dk(day,id,dtk)];}
function skipped(day,id,dtk){return!!(S.skipped&&S.skipped[dk(day,id,dtk)]);}
function snoozed(day,id,dtk){return!!(S.snoozed&&S.snoozed[dk(day,id,dtk)]);}

function getDateKey(dayName){
  const idx=DAYS.indexOf(dayName);
  const offset=idx-todayIdx;
  const d=new Date(now);d.setDate(d.getDate()+offset);
  return d.toISOString().split('T')[0];
}

function dayProg(dayName,dtk){
  const tasks=(SCHEDULE[dayName]||[]).filter(t=>t.f!=='m'&&!skipped(dayName,t.id,dtk));
  const d=tasks.filter(t=>done(dayName,t.id,dtk)).length;
  return{done:d,total:tasks.length};
}

function calcStreak(){
  let s=0;const d=new Date(now);
  for(let i=0;i<90;i++){
    const dtk=d.toISOString().split('T')[0];
    const dn=DAYS[d.getDay()];
    const tasks=(SCHEDULE[dn]||[]).filter(t=>t.f!=='m');
    if(tasks.length===0){d.setDate(d.getDate()-1);continue;}
    const{done:dn2,total}=dayProg(dn,dtk);
    if(total>0&&dn2===total)s++;
    else if(i>0)break;
    d.setDate(d.getDate()-1);
  }
  return s;
}

function calcShame(){
  let shame=0;
  for(let i=1;i<=3;i++){
    const d=new Date(now);d.setDate(d.getDate()-i);
    const dtk=d.toISOString().split('T')[0];
    const dn=DAYS[d.getDay()];
    (SCHEDULE[dn]||[]).filter(t=>t.f!=='m').forEach(t=>{
      if(!done(dn,t.id,dtk)&&!skipped(dn,t.id,dtk))shame++;
    });
  }
  return shame;
}

function totalDone(){
  return Object.keys(S).filter(k=>k.includes('|')&&S[k]===true).length;
}

function checkBadges(){
  const streak=calcStreak();
  const shame=calcShame();
  const total=totalDone();
  const bs={streak,shame,total,perfect:S.perfect};
  let newBadge=false;
  BADGES.forEach(b=>{
    if(!S.badges[b.id]&&b.cond(bs)){
      S.badges[b.id]=true;newBadge=true;
      setTimeout(()=>showToast(b.icon+' Badge unlocked: '+b.name),300);
    }
  });
  if(newBadge)sv();
}

function toggle(day,id,dtk){
  const k=dk(day,id,dtk);
  S[k]=!S[k];
  if(S[k]&&S.snoozed)delete S.snoozed[k];
  sv();
  const{done:d,total}=dayProg(day,dtk);
  if(d===total&&total>0){S.perfect=true;sv();if(day===todayName)confetti();}
  checkBadges();
  renderCurrent();
}

function snoozeTask(day,id,dtk){
  const k=dk(day,id,dtk);
  if(!S.snoozed)S.snoozed={};
  S.snoozed[k]=true;S[k]=false;sv();
  showToast('Snoozed — will remind you tomorrow');
  renderCurrent();
}

function skipTask(day,id,dtk){
  const k=dk(day,id,dtk);
  if(!S.skipped)S.skipped={};
  S.skipped[k]=!S.skipped[k];sv();
  showToast(S.skipped[k]?'Task skipped':'Task unskipped');
  renderCurrent();
}

function markRoomClean(id){
  S.rooms[id]=new Date().toISOString();sv();
  renderRooms();showToast('Room logged as clean!');
}

function roomSt(id){
  const last=S.rooms[id];
  if(!last)return{label:'Never logged',cls:'rs-over',days:999};
  const days=Math.floor((now-new Date(last))/(864e5));
  if(days===0)return{label:'Cleaned today',cls:'rs-good',days};
  if(days<=3)return{label:days+' day'+(days>1?'s':'')+' ago',cls:'rs-good',days};
  if(days<=7)return{label:days+' days ago',cls:'rs-ok',days};
  return{label:days+' days ago — due!',cls:'rs-over',days};
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2500);
}

function confetti(){
  const wrap=document.getElementById('confetti');
  wrap.innerHTML='';
  const cols=['#1D9E75','#9FE1CB','#EF9F27','#378ADD','#D4537E','#7F77DD','#F09595'];
  for(let i=0;i<50;i++){
    const el=document.createElement('div');
    el.className='conf';
    el.style.cssText=`left:${Math.random()*100}%;background:${cols[Math.floor(Math.random()*cols.length)]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;animation-duration:${0.9+Math.random()*1.3}s;animation-delay:${Math.random()*0.4}s;border-radius:${Math.random()>.5?'50%':'3px'}`;
    wrap.appendChild(el);
  }
  setTimeout(()=>wrap.innerHTML='',3000);
}

function fBadge(f){
  if(f==='m')return' <span class="badge-m">monthly</span>';
  if(f==='a')return' <span class="badge-a">as needed</span>';
  return'';
}

function taskHtml(day,t,dtk){
  const d=done(day,t.id,dtk);
  const sk=skipped(day,t.id,dtk);
  const sn=snoozed(day,t.id,dtk);
  return`<div class="task-row" style="${sk?'opacity:.4':''}">
    <div class="check ${d&&!sk?'done':''}" onclick="toggle('${day}','${t.id}','${dtk}')">
      <svg width="11" height="11" viewBox="0 0 11 11"><polyline points="1.5,5.5 4.5,8.5 9.5,2.5" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <span class="task-name ${d&&!sk?'done':''}">${t.t}${sn?'<span class="badge-snz" style="margin-left:5px">snoozed</span>':''}${fBadge(t.f)}</span>
    <div class="task-actions">
      ${!d?`<button class="act-btn" onclick="snoozeTask('${day}','${t.id}','${dtk}')">Later</button>`:''}
      <button class="act-btn" onclick="skipTask('${day}','${t.id}','${dtk}')">${sk?'Undo':'Skip'}</button>
    </div>
  </div>`;
}

function renderToday(){
  const tasks=SCHEDULE[todayName]||[];
  const weekly=tasks.filter(t=>t.f!=='m');
  const monthly=tasks.filter(t=>t.f==='m');
  const{done:d,total}=dayProg(todayName,todayKey);
  const pct=total?Math.round(d/total*100):0;
  const streak=calcStreak();
  const shame=calcShame();

  document.getElementById('streak-pill').textContent=streak+' day'+(streak===1?'':' days')+' streak 🔥';

  const yd=new Date(now);yd.setDate(yd.getDate()-1);
  const ydKey=yd.toISOString().split('T')[0];
  const ydName=DAYS[yd.getDay()];
  const ymissed=(SCHEDULE[ydName]||[]).filter(t=>t.f!=='m'&&!done(ydName,t.id,ydKey)&&!skipped(ydName,t.id,ydKey)).length;
  const overdueHtml=ymissed>0?`<div class="overdue-banner"><strong>${ymissed} task${ymissed>1?'s':''} missed yesterday</strong><br>Head to the Week tab to catch up.</div>`:'';

  document.getElementById('page-today').innerHTML=`
    ${overdueHtml}
    <div class="stat-grid">
      <div class="stat ${pct===100?'good':''}">
        <div class="stat-label">Today's progress</div>
        <div class="stat-val">${pct}%</div>
        <div class="stat-sub">${d} of ${total} done</div>
      </div>
      <div class="stat ${shame===0?'good':'shame'}">
        <div class="stat-label">Shame score</div>
        <div class="stat-val">${shame}</div>
        <div class="stat-sub">${shame===0?'All clear! 🌟':'tasks overdue'}</div>
      </div>
    </div>
    <div class="prog-wrap"><div class="prog-bar" style="width:${pct}%"></div></div>
    <div class="prog-labels"><span>${d} complete</span><span>${total-d} remaining</span></div>
    <div class="sec">Today's tasks — ${todayName}</div>
    <div class="task-card">${weekly.map(t=>taskHtml(todayName,t,todayKey)).join('')||'<div class="empty">No tasks today</div>'}</div>
    <div class="sec">Monthly tasks (tick when doing them)</div>
    <div class="task-card">${monthly.map(t=>taskHtml(todayName,t,todayKey)).join('')||'<div class="empty">No monthly tasks today</div>'}</div>
    <button class="btn-primary" onclick="markAll('${todayName}','${todayKey}')">Mark all done ✓</button>
    <button class="btn-ghost" onclick="resetDay('${todayName}','${todayKey}')">Reset today</button>
  `;
}

function renderWeek(){
  const pills=DAYS.map(d=>{
    const dtk=getDateKey(d);
    const{done:dn,total}=dayProg(d,dtk);
    const isT=d===todayName;
    const cls=selDay===d?'sel':total>0&&dn===total?'done-pill':dn>0?'part-pill':'';
    return`<div class="day-pill ${cls}" onclick="selDay='${d}';renderWeek()">${DS[DAYS.indexOf(d)]}${isT?' ·':''}</div>`;
  }).join('');

  const dtk=getDateKey(selDay);
  const tasks=SCHEDULE[selDay]||[];
  const weekly=tasks.filter(t=>t.f!=='m');
  const monthly=tasks.filter(t=>t.f==='m');
  const{done:d,total}=dayProg(selDay,dtk);
  const pct=total?Math.round(d/total*100):0;

  document.getElementById('page-week').innerHTML=`
    <div class="day-pills">${pills}</div>
    <div class="prog-wrap"><div class="prog-bar" style="width:${pct}%"></div></div>
    <div class="prog-labels" style="margin-bottom:12px"><span>${d} of ${total} done</span><span>${pct}%</span></div>
    ${weekly.length?`<div class="sec">Tasks for ${selDay}</div><div class="task-card">${weekly.map(t=>taskHtml(selDay,t,dtk)).join('')}</div>`:''}
    ${monthly.length?`<div class="sec">Monthly tasks</div><div class="task-card">${monthly.map(t=>taskHtml(selDay,t,dtk)).join('')}</div>`:''}
    ${!tasks.length?`<div class="empty">No tasks for ${selDay}</div>`:''}
    <button class="btn-primary" onclick="markAll('${selDay}','${dtk}')">Mark all done for ${selDay}</button>
  `;
}

function renderRooms(){
  const html=ROOMS.map(r=>{
    const st=roomSt(r.id);
    const bg=st.cls==='rs-good'?'#EAF3DE':st.cls==='rs-ok'?'#FAEEDA':'#FCEBEB';
    return`<div class="room-card">
      <div class="room-icon" style="background:${bg}">${r.icon}</div>
      <div style="flex:1">
        <div class="room-name">${r.name}</div>
        <div class="room-last">${st.label}</div>
      </div>
      <span class="room-status ${st.cls}">${st.cls==='rs-good'?'Good':st.cls==='rs-ok'?'Due soon':'Overdue'}</span>
      <button class="act-btn" style="margin-left:8px" onclick="markRoomClean('${r.id}')">Done</button>
    </div>`;
  }).join('');

  document.getElementById('page-rooms').innerHTML=`
    <div class="sec">Last cleaned tracker</div>
    ${html}
    <div style="background:#f0f0f0;border-radius:12px;padding:12px;font-size:12px;color:#888;line-height:1.6;margin-top:6px">
      Tap <strong>Done</strong> after finishing a room. Green = within 3 days, amber = 4–7 days, red = 7+ days.
    </div>
  `;
}

function renderStats(){
  const streak=calcStreak();
  const shame=calcShame();
  let w7d=0,w7t=0;
  for(let i=0;i<7;i++){
    const d=new Date(now);d.setDate(d.getDate()-i);
    const dtk=d.toISOString().split('T')[0];
    const dn=DAYS[d.getDay()];
    const{done,total}=dayProg(dn,dtk);
    w7d+=done;w7t+=total;
  }
  const w7pct=w7t?Math.round(w7d/w7t*100):0;

  const wgHtml=DAYS.map(d=>{
    const dtk=getDateKey(d);
    const{done,total}=dayProg(d,dtk);
    const isT=d===todayName;
    const cls=total===0?'wc-none':done===total?'wc-full':done>0?'wc-part':'wc-none';
    return`<div class="wc ${cls} ${isT?'wc-today':''}"><span>${total?Math.round(done/total*100)+'%':'—'}</span><span class="wc-lbl">${DS[DAYS.indexOf(d)]}</span></div>`;
  }).join('');

  let hmHtml='';
  for(let i=27;i>=0;i--){
    const d=new Date(now);d.setDate(d.getDate()-i);
    const dtk=d.toISOString().split('T')[0];
    const dn=DAYS[d.getDay()];
    const{done,total}=dayProg(dn,dtk);
    const lvl=total===0?0:Math.min(4,Math.ceil(done/Math.max(total,1)*4));
    hmHtml+=`<div class="hm hm${lvl}" title="${dn} ${dtk}: ${done}/${total}"></div>`;
  }

  const GOALS=[
    {name:'Complete 5 full days this week',val:()=>{let v=0;for(let i=0;i<7;i++){const d=new Date(now);d.setDate(d.getDate()-i);const dtk=d.toISOString().split('T')[0];const dn=DAYS[d.getDay()];const{done,total}=dayProg(dn,dtk);if(total>0&&done===total)v++;}return v;},target:5},
    {name:'Hit 80% average this week',val:()=>w7pct,target:80,unit:'%'},
    {name:'Achieve a 7-day streak',val:()=>streak,target:7,unit:' days'},
  ];

  const goalsHtml=GOALS.map(g=>{
    const v=g.val();const pct=Math.min(100,Math.round(v/g.target*100));
    return`<div class="goal-card">
      <div class="goal-head"><span class="goal-title">${g.name}</span><span class="goal-pct">${pct}%</span></div>
      <div class="prog-wrap"><div class="prog-bar" style="width:${pct}%"></div></div>
      <div style="font-size:11px;color:#888;margin-top:3px">${v}${g.unit||''} of ${g.target}${g.unit||''}</div>
    </div>`;
  }).join('');

  const badgesHtml=BADGES.map(b=>{
    const earned=!!S.badges[b.id];
    return`<div class="badge-item ${earned?'':'badge-locked'}">
      <div class="badge-icon" style="background:${earned?'#EAF3DE':'#f0f0f0'}">${b.icon}</div>
      <div><div class="badge-name">${b.name}</div><div class="badge-desc">${b.desc}</div></div>
    </div>`;
  }).join('');

  document.getElementById('page-stats').innerHTML=`
    <div class="stat-grid">
      <div class="stat"><div class="stat-label">7-day rate</div><div class="stat-val">${w7pct}%</div><div class="stat-sub">${w7d}/${w7t} tasks</div></div>
      <div class="stat ${shame===0?'good':'shame'}"><div class="stat-label">Shame score</div><div class="stat-val">${shame}</div><div class="stat-sub">${shame===0?'Zero overdue':'tasks missed'}</div></div>
    </div>
    <div class="sec">This week</div>
    <div class="week-grid">${wgHtml}</div>
    <div class="sec">4-week heatmap</div>
    <div class="hm-grid">${hmHtml}</div>
    <div class="sec">Goals</div>
    ${goalsHtml}
    <div class="sec">Badges</div>
    <div class="badge-grid">${badgesHtml}</div>
  `;
}

function renderMore(){
  const season=getSeason();
  const se=SEASONAL[season];

  const monthlyHtml=MONTHLY_ROT.map(t=>{
    const k='mr_'+t.replace(/\W/g,'_')+todayKey.slice(0,7);
    const d=!!S[k];
    return`<div class="task-row" onclick="S['${k}']=!S['${k}'];sv();renderMore()">
      <div class="check ${d?'done':''}"><svg width="11" height="11" viewBox="0 0 11 11"><polyline points="1.5,5.5 4.5,8.5 9.5,2.5" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <span class="task-name ${d?'done':''}">${t}</span>
    </div>`;
  }).join('');

  const seasonHtml=se.tasks.map(t=>{
    const k='sea_'+season+'_'+t.replace(/\W/g,'_');
    const on=!!S.season[k];
    return`<div class="toggle-row">
      <span class="toggle-label">${t}</span>
      <div class="tog ${on?'on':''}" onclick="S.season['${k}']=!S.season['${k}'];sv();renderMore()"><div class="tog-knob"></div></div>
    </div>`;
  }).join('');

  let w7d=0,w7t=0;
  for(let i=0;i<7;i++){
    const d=new Date(now);d.setDate(d.getDate()-i);
    const dtk=d.toISOString().split('T')[0];
    const dn=DAYS[d.getDay()];
    const{done,total}=dayProg(dn,dtk);
    w7d+=done;w7t+=total;
  }
  const w7pct=w7t?Math.round(w7d/w7t*100):0;
  const grade=w7pct>=95?'A+':w7pct>=85?'A':w7pct>=75?'B':w7pct>=60?'C':w7pct>=40?'D':'F';
  const gradeCls=w7pct>=75?'':'grade-'+(w7pct>=60?'c':w7pct>=40?'d':'f');
  const gradeMsg=w7pct>=95?'Spotless — your apartment is absolutely thriving!':w7pct>=85?'Really solid week, you\'re nailing the routine.':w7pct>=75?'Good progress — a couple more days makes a big difference.':w7pct>=60?'Getting there — keep the momentum going.':w7pct>=40?'Room for improvement. Every task counts!':'Time to get back on track — you\'ve got this.';

  const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
  const isAndroid=/android/i.test(navigator.userAgent);
  const installHint=isIOS?`<div class="install-hint"><strong>Add to Home Screen:</strong> Tap the Share button in Safari, then tap "Add to Home Screen" to use Spotless like a native app.</div>`:
    isAndroid?`<div class="install-hint"><strong>Install app:</strong> Tap the menu (⋮) in Chrome, then "Add to Home screen" to install Spotless.</div>`:
    `<div class="install-hint"><strong>On your phone:</strong> Open this file in Safari (iOS) or Chrome (Android), then add to home screen for an app-like experience.</div>`;

  document.getElementById('page-more').innerHTML=`
    ${installHint}
    <div class="sec">Weekly report card</div>
    <div class="report-card">
      <div style="font-size:13px;color:#888">${w7d} of ${w7t} tasks completed this week</div>
      <div class="report-grade ${gradeCls}">${grade}</div>
      <div class="report-msg">${gradeMsg}</div>
    </div>
    <div class="sec">Monthly rotation — ${now.toLocaleString('default',{month:'long'})}</div>
    <div class="task-card">${monthlyHtml}</div>
    <div class="sec">${se.icon} ${season.charAt(0).toUpperCase()+season.slice(1)} tasks</div>
    <div class="season-card">
      <div class="season-head"><span class="season-icon">${se.icon}</span><span class="season-title">${season.charAt(0).toUpperCase()+season.slice(1)} extras</span></div>
      ${seasonHtml}
    </div>
    <div class="sec">Evening reminder</div>
    <div class="notif-row">
      <div class="notif-info"><div class="notif-title">Reminder time</div><div class="notif-sub">Set when you want your daily nudge</div></div>
    </div>
    <input type="time" value="${S.notifTime}" onchange="S.notifTime=this.value;sv();showToast('Reminder set for '+this.value)" />
    <div style="height:16px"></div>
    <button class="btn-danger" onclick="if(confirm('This will delete all your progress and cannot be undone. Are you sure?')){localStorage.removeItem('spotless_v3');location.reload()}">Reset all data</button>
  `;
}

function markAll(day,dtk){
  (SCHEDULE[day]||[]).filter(t=>t.f!=='m').forEach(t=>{S[dk(day,t.id,dtk)]=true;});
  S.perfect=true;sv();checkBadges();confetti();renderCurrent();showToast('All tasks done!');
}

function resetDay(day,dtk){
  (SCHEDULE[day]||[]).forEach(t=>{delete S[dk(day,t.id,dtk)];});
  sv();renderCurrent();showToast('Day reset');
}

function nav(page,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  btn.classList.add('active');
  curPage=page;renderCurrent();
}

function renderCurrent(){
  if(curPage==='today')renderToday();
  else if(curPage==='week')renderWeek();
  else if(curPage==='rooms')renderRooms();
  else if(curPage==='stats')renderStats();
  else if(curPage==='more')renderMore();
}

document.getElementById('hdate').textContent=now.toLocaleDateString('en-AU',{weekday:'long',day:'numeric',month:'long'});
renderToday();
</script>
</body>
</html>
